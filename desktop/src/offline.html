<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spitball Desktop</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f3ef;
        color: #1d2328;
      }

      main {
        width: min(680px, calc(100vw - 48px));
        border: 1px solid #d7cec3;
        border-radius: 8px;
        background: #fffdf9;
        padding: 32px;
        box-shadow: 0 18px 45px rgba(42, 32, 20, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 18px;
        color: #596168;
        line-height: 1.55;
      }

      code {
        display: block;
        overflow-x: auto;
        border: 1px solid #d7cec3;
        border-radius: 6px;
        background: #15191d;
        color: #fffdf9;
        padding: 14px 16px;
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 14px;
      }

      .target {
        margin-top: 18px;
        font-size: 13px;
        color: #727a82;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #121518;
          color: #f4f0eb;
        }

        main {
          border-color: #3e454b;
          background: #1b2024;
          box-shadow: none;
        }

        p {
          color: #b8c0c8;
        }

        code {
          border-color: #505961;
          background: #0d1012;
        }

        .target {
          color: #98a2ab;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Spitball is not running</h1>
      <p>
        The desktop shell attaches to an existing Spitball Vite development
        server. Start the browser app separately, then relaunch the desktop app.
      </p>
      <code id="start-command">cd packages/spitball &amp;&amp; npm run dev</code>
      <p class="target" id="target-url"></p>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const startCommand = params.get("startCommand");
      const appUrl = params.get("appUrl");
      if (startCommand) {
        document.getElementById("start-command").textContent = startCommand;
      }
      if (appUrl) {
        document.getElementById("target-url").textContent = `Target URL: ${appUrl}`;
      }
    </script>
  </body>
</html>
